name: Daily Ireland SME Scanner

on:
  schedule:
    # 7:00 AM UTC = 8:00 AM Irish time (IST, UTC+1)
    - cron: '0 7 * * *'
  workflow_dispatch:   # manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SME scanner
        run: python sme_scanner.py

      - name: Commit and push results
        run: |
          git config user.name  "sme-scanner[bot]"
          git config user.email "sme-scanner@users.noreply.github.com"
          git add results/
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
          else
            COUNT=$(python -c "import json; d=json.load(open('results/latest.json')); print(d['total'])")
            git commit -m "scan: $(date +'%Y-%m-%d') — ${COUNT} Irish SMEs without website"
            git pull --rebase origin main
            git push origin main
          fi
